version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
